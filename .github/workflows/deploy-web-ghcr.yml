name: deploy-web-ghcr

# Builds the web-managed multi-account image (Dockerfile.web) and pushes it to
# GHCR as ghcr.io/patriqcs/twitch-channel-points-miner-v2:web. Uses the built-in
# GITHUB_TOKEN — no extra secrets required.

on:
  push:
    branches: [master]
    paths:
      - 'Dockerfile.web'
      - 'backend/**'
      - 'frontend/**'
      - 'TwitchChannelPointsMiner/**'
      - 'miner_runner.py'
      - 'run.py'
      - 'requirements.txt'
      - '.github/workflows/deploy-web-ghcr.yml'
  workflow_dispatch:

jobs:
  deploy-web-ghcr:
    name: Build & push web image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Login to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/patriqcs/twitch-channel-points-miner-v2
          tags: |
            type=raw,value=web
            type=raw,value=web-{{sha}}

      - name: Build and push (amd64)
        id: docker_build
        uses: docker/build-push-action@v6.9.0
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
