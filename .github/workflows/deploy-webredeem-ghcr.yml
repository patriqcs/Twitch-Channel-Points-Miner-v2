name: deploy-webredeem-ghcr

# Builds the public redeem website image (Dockerfile.webredeem) and pushes it
# to GHCR as ghcr.io/patriqcs/twitch-channel-points-miner-v2 with the tags
# webredeem/webredeem-<sha>. Same package as the web image because the built-in
# GITHUB_TOKEN can only push to a package linked to this repo.

on:
  push:
    branches: [master]
    paths:
      - 'Dockerfile.webredeem'
      - 'webredeem/**'
      - '.github/workflows/deploy-webredeem-ghcr.yml'
  workflow_dispatch:

jobs:
  deploy-webredeem-ghcr:
    name: Build & push webredeem image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.7.1

      - name: Login to GHCR
        uses: docker/login-action@v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/patriqcs/twitch-channel-points-miner-v2
          tags: |
            type=raw,value=webredeem
            type=raw,value=webredeem-{{sha}}

      - name: Build and push (amd64)
        id: docker_build
        uses: docker/build-push-action@v6.9.0
        with:
          context: .
          file: Dockerfile.webredeem
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          # Plain single-image manifest (see deploy-web-ghcr.yml for why).
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
